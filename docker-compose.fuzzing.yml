# Fuzzing bundle

services:
  dharma-mcp:
    extends:
      file: ./docker-compose.yml
      service: dharma-mcp

  boofuzz-mcp:
    extends:
      file: ./docker-compose.yml
      service: boofuzz-mcp

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  dharma-grammars:
    driver: local
  dharma-output:
    driver: local
  boofuzz-scripts:
    driver: local
  boofuzz-results:
    driver: local
