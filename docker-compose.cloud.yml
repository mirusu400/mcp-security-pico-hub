# Cloud Security bundle

services:
  trivy-mcp:
    extends:
      file: ./docker-compose.yml
      service: trivy-mcp

  prowler-mcp:
    extends:
      file: ./docker-compose.yml
      service: prowler-mcp

  roadrecon-mcp:
    extends:
      file: ./docker-compose.yml
      service: roadrecon-mcp

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  trivy-output:
    driver: local
  trivy-cache:
    driver: local
  prowler-output:
    driver: local
